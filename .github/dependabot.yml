version: 2
updates:
  # Keep GitHub Actions versions fresh — the one dependency surface taze does
  # not cover (taze handles npm packages via the pnpm catalog).
  #
  # npm is intentionally omitted: every workspace dep is a `catalog:` reference
  # resolved in pnpm-workspace.yaml, which Dependabot's npm ecosystem does not
  # read reliably — `taze` (catalog-aware) owns dependency updates.
  #
  # CodeQL / code scanning is not configured: it requires GitHub Advanced
  # Security on private repositories. Revisit if this repo goes public or gets GHAS.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

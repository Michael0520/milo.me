version: 2
updates:
  # Dependabot owns GitHub Actions version updates only.
  #
  # npm is intentionally omitted: every workspace dep is a `catalog:` reference
  # resolved in pnpm-workspace.yaml, which Dependabot's npm ecosystem does not
  # read reliably. Renovate (catalog-aware) owns automated npm/catalog updates
  # and `taze` is the manual lane — splitting them avoids duplicate PRs.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

name: CodeQL

# Static analysis for JavaScript/TypeScript. voidzero-dev/vite-plus itself does
# not use CodeQL (it's a Rust project — cargo-deny in its security.yml), so this
# mirrors their *style* — committed, SHA-pinned, permissions: {}, zizmor-audited
# — rather than copying a file. Free on public repos; closes the last security
# gap alongside zizmor (workflows) and secret scanning.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 2 * * 1" # weekly, Monday 02:30 UTC

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to code scanning
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # JS/TS needs no build step — CodeQL analyzes source directly. Skip the
      # built Slidev decks (minified vendor bundles) and deck sources (not app
      # code) to cut noise.
      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: javascript-typescript
          config: |
            paths-ignore:
              - apps/portfolio/public/slides
              - apps/slides

      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:javascript-typescript"

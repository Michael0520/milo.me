name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install
        run: vp install --frozen-lockfile

      - name: Check
        run: vp check

      - name: Type Check
        run: vp run michaello-portfolio#check-types

      - name: Build
        run: vp run michaello-portfolio#build

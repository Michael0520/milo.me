name: CI

# Zero permissions by default; each job opts into exactly what it needs.
permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  # Never cancel an in-progress build on main; only supersede PR-branch runs.
  cancel-in-progress: ${{ github.ref_name != 'main' }}

defaults:
  run:
    shell: bash

jobs:
  # Skip the heavy jobs when a change touches only non-build paths.
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code-changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '!apps/slides/**'
              - '!apps/portfolio/public/slides/**'
              - '!.claude/**'
              - '!docs/**'
              - '!openspec/**'
              - '!**/*.md'

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.code-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Check
        run: vp check
      - name: Type Check
        run: vp run michaello-portfolio#check-types
      - name: Build
        run: vp run michaello-portfolio#build

  e2e:
    needs: detect-changes
    if: needs.detect-changes.outputs.code-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Install Playwright browser
        run: vp run michaello-portfolio#test:e2e:install
      - name: Build
        run: vp run michaello-portfolio#build
      - name: Run e2e tests
        run: vp run michaello-portfolio#test:e2e

  # Single aggregation gate: passes when build & e2e succeed OR are skipped
  # (docs/slides-only change); fails if either fails.
  done:
    needs: [detect-changes, build, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: CI result
        run: |
          # detect-changes has no `if:` guard, so success is its only healthy
          # outcome. If it fails, build & e2e are skipped for want of their
          # gating output — indistinguishable below from a legitimate
          # docs-only skip. Without this check `done` reports green and
          # branch protection lets the PR merge with nothing verified.
          if [ "${{ needs.detect-changes.result }}" != 'success' ]; then
            echo "CI failed (detect-changes: ${{ needs.detect-changes.result }})"
            exit 1
          fi

          for pair in "build:${{ needs.build.result }}" "e2e:${{ needs.e2e.result }}"; do
            name=${pair%%:*}
            result=${pair##*:}
            if [ "$result" = 'failure' ] || [ "$result" = 'cancelled' ]; then
              echo "CI failed ($name: $result)"
              exit 1
            fi
          done
          echo "CI passed (build: ${{ needs.build.result }}, e2e: ${{ needs.e2e.result }})"

name: Zizmor

# Static security analysis of our GitHub Actions workflows + composite actions
# (zizmor.sh). Catches credential-persistence, over-broad permissions, template
# injection, and dangerous token use. Runs offline for determinism — no token,
# no network flakiness; the offline audits already cover our threat model since
# every action is SHA-pinned.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Run zizmor
        # renovate: datasource=pypi depName=zizmor
        # 1.27.0 was yanked (GHSA-f42p-wjw5-97qh: debug logging could print
        # credentials in cleartext). A bare version in a run block is invisible
        # to Dependabot (github-actions only) and Renovate (github-actions
        # disabled); the datasource comment above lets Renovate manage it.
        run: uvx zizmor@1.28.0 --persona=regular --no-online-audits .github/workflows/ .github/actions/

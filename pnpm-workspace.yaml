packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  "@fission-ai/openspec": false

# Single source of truth for dependency versions across the monorepo.
# To bump a version, edit it here; every workspace that references
# `"<pkg>": "catalog:"` updates in one place.
catalog:
  # Framework
  next: 16.1.7
  react: 19.2.6
  react-dom: 19.2.6

  # React ecosystem
  "@base-ui/react": ^1.5.0
  "@bprogress/next": ^3.2.12
  "@c15t/nextjs": ^2.1.0
  "@hookform/resolvers": ^4.1.3
  "@ncdai/react-wheel-picker": ^1.2.2
  "@next/third-parties": ^16.2.6
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  cmdk: ^1.1.1
  dialkit: ^1.2.0
  geist: ^1.7.1
  jotai: ^2.20.0
  lucide-react: ^1.17.0
  motion: ^12.40.0
  next-mdx-remote: ^6.0.0
  next-themes: ^0.4.6
  nuqs: ^2.8.9
  posthog-js: ^1.376.4
  radix-ui: ^1.4.3
  react-fast-marquee: ^1.6.5
  react-hook-form: ^7.76.1
  react-hotkeys-hook: ^5.3.2
  react-markdown: ^10.1.0
  react-medium-image-zoom: ^5.4.5
  react-resizable-panels: ^4.11.2
  schema-dts: ^2.0.0
  shaders: ^2.5.128
  sharp: ^0.34.5
  sonner: ^2.0.7
  tailwind-merge: ^3.6.0
  vcard-creator: ^1.0.0
  web-haptics: ^0.0.6

  # Content / docs pipeline
  fumadocs-core: ^16.9.3
  fumadocs-typescript: ^5.2.6
  hast-util-to-jsx-runtime: ^2.3.6
  mermaid: ^11.15.0
  rehype-external-links: ^3.0.0
  rehype-pretty-code: ^0.14.3
  rehype-raw: ^7.0.0
  rehype-slug: ^6.0.0
  remark: ^15.0.1
  remark-gfm: ^4.0.1
  remark-mdx: ^3.1.1
  remark-rehype: ^11.1.2
  shiki: 4.0.2
  unist-builder: ^4.0.0
  unist-util-visit: ^5.1.0

  # Utility libraries
  "@date-fns/tz": ^1.5.0
  date-fns: ^4.4.0
  gray-matter: ^4.0.3
  libphonenumber-js: ^1.13.4
  lru-cache: ^11.5.1
  zod: ^3.25.76

  # Styling
  "@tailwindcss/postcss": ^4.3.0
  "@tailwindcss/typography": ^0.5.19
  "@toolwind/corner-shape": 0.0.8-3
  tailwindcss: ^4.3.0
  tw-animate-css: ^1.4.0

  # Types
  "@total-typescript/ts-reset": ^0.6.1
  "@types/hast": ^3.0.4
  "@types/unist": ^3.0.3
  "@types/node": ^25.9.1
  "@types/react": 19.2.14
  "@types/react-dom": 19.2.3

  # Tooling
  "@fission-ai/openspec": ^1.3.1
  libphonenumber-metadata-generator: ^2.0.6
  puppeteer: ^24.43.1
  rimraf: ^6.1.3
  shadcn: ^4.8.3
  strip-indent: ^4.1.1
  typescript: ^6.0.3

  # Vite+ toolchain
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.23
  vite-plus: ^0.1.23
  vitest: npm:@voidzero-dev/vite-plus-test@latest

# Named catalog for experimental workspaces (packages/utils) that
# want to run ahead of the default catalog.
catalogs:
  preview:
    "@types/node": ^25.9.1
    typescript: ^6.0.3

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

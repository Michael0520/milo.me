packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  "@fission-ai/openspec": false

catalog:
  "@fission-ai/openspec": ^1.2.0
  "@types/node": ^24.12.2
  mermaid: ^11.14.0
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  "@fission-ai/openspec": false

# Single source of truth for dependency versions across the monorepo.
# To bump a version, edit it here; every workspace that references
# `"<pkg>": "catalog:"` updates in one place.
catalog:
  # Framework
  next: 16.1.7
  react: 19.2.6
  react-dom: 19.2.6

  # React ecosystem
  "@base-ui/react": ^1.6.0
  "@bprogress/next": ^3.2.12
  "@c15t/nextjs": ^2.1.0
  "@hookform/resolvers": ^4.1.3
  "@ncdai/react-wheel-picker": ^1.2.2
  "@next/third-parties": ^16.2.10
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  cmdk: ^1.1.1
  dialkit: ^1.3.0
  geist: ^1.7.2
  jotai: ^2.20.1
  lucide-react: ^1.23.0
  motion: ^12.42.2
  next-themes: ^0.4.6
  nuqs: ^2.9.0
  radix-ui: ^1.6.1
  react-fast-marquee: ^1.6.5
  react-hook-form: ^7.81.0
  react-hotkeys-hook: ^5.3.3
  react-medium-image-zoom: ^5.4.8
  react-resizable-panels: ^4.12.1
  schema-dts: ^2.0.0
  shaders: ^2.5.134
  sharp: ^0.34.5
  sonner: ^2.0.7
  tailwind-merge: ^3.6.0
  vcard-creator: ^1.0.0
  web-haptics: ^0.0.6

  # Content / docs pipeline
  fumadocs-core: ^16.10.7
  fumadocs-typescript: ^5.2.7
  hast-util-to-jsx-runtime: ^2.3.6
  mermaid: ^11.16.0
  next-mdx-remote: ^6.0.0
  react-markdown: ^10.1.0
  rehype-external-links: ^3.0.0
  rehype-pretty-code: ^0.14.3
  rehype-raw: ^7.0.0
  rehype-slug: ^6.0.0
  remark: ^15.0.1
  remark-gfm: ^4.0.1
  remark-mdx: ^3.1.1
  remark-rehype: ^11.1.2
  shiki: 4.0.2
  unist-builder: ^4.0.0
  unist-util-visit: ^5.1.0

  # Utility libraries
  "@date-fns/tz": ^1.5.0
  date-fns: ^4.4.0
  gray-matter: ^4.0.3
  libphonenumber-js: ^1.13.8
  lru-cache: ^11.5.1
  zod: ^3.25.76

# Semantic named catalogs — each name describes WHY the package is here.
# Reference as "catalog:<name>" in workspace package.json files.
catalogs:
  build:
    "@tailwindcss/postcss": ^4.3.2
    "@tailwindcss/typography": ^0.5.20
    "@toolwind/corner-shape": 0.0.8-3
    rimraf: ^6.1.3
    tailwindcss: ^4.3.2
    tw-animate-css: ^1.4.0
    typescript: ^6.0.3
    vite: npm:@voidzero-dev/vite-plus-core@^0.2.2
    vite-plus: ^0.2.2
    vitest: npm:@voidzero-dev/vite-plus-test@latest

  types:
    "@total-typescript/ts-reset": ^0.6.1
    "@types/hast": ^3.0.4
    "@types/node": ^25.9.4
    "@types/react": 19.2.14
    "@types/react-dom": 19.2.3
    "@types/unist": ^3.0.3

  script:
    "@fission-ai/openspec": ^1.5.0
    libphonenumber-metadata-generator: ^2.0.6
    puppeteer: ^24.43.1
    shadcn: ^4.13.0
    strip-indent: ^4.1.1

  # Slidev presentation toolchain (apps/slides). Bun → pnpm; real vite 7 (see overrides).
  slides:
    "@iconify-json/carbon": 1.2.14
    "@iconify-json/logos": 1.2.10
    "@iconify-json/material-symbols": 1.2.48
    "@iconify-json/ph": 1.2.2
    "@iconify-json/ri": 1.2.6
    "@iconify-json/simple-icons": 1.2.60
    "@iconify-json/twemoji": 1.2.4
    "@slidev/cli": 52.6.0
    "@slidev/client": 52.6.0
    "@slidev/theme-default": 0.25.0
    playwright-chromium: ^1.58.2
    seedrandom: ^3.0.5
    unocss: ^66.6.4
    vis-timeline: ^8.5.0

catalogMode: prefer
overrides:
  # vite → vite-plus only for the vite-plus consumers. apps/slides (Slidev) must keep
  # real vite 7, so the override is scoped instead of global.
  "michaello-portfolio>vite": "catalog:build"
  "website>vite": "catalog:build"
  "utils>vite": "catalog:build"
  vitest: "catalog:build"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

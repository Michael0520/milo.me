packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  "@fission-ai/openspec": false

# Single source of truth for dependency versions across the monorepo.
# To bump a version, edit it here; every workspace that references
# `"<pkg>": "catalog:"` updates in one place.
catalog:
  # Framework
  next: 16.2.1
  react: 19.2.4
  react-dom: 19.2.4

  # React ecosystem
  "@base-ui/react": ^1.4.0
  "@bprogress/next": ^3.2.12
  "@c15t/nextjs": ^1.8.6
  "@hookform/resolvers": ^4.1.3
  "@ncdai/react-wheel-picker": ^1.2.2
  "@next/third-parties": ^16.2.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  cmdk: ^1.1.1
  dialkit: ^1.2.0
  geist: ^1.7.0
  jotai: ^2.19.1
  lucide-react: ^1.8.0
  motion: ^12.38.0
  next-mdx-remote: ^6.0.0
  next-themes: ^0.4.6
  nuqs: ^2.8.9
  posthog-js: ^1.369.1
  radix-ui: ^1.4.3
  react-fast-marquee: ^1.6.5
  react-hook-form: ^7.72.1
  react-hotkeys-hook: ^5.2.4
  react-markdown: ^10.1.0
  react-medium-image-zoom: ^5.4.3
  react-resizable-panels: ^4.10.0
  schema-dts: ^1.1.5
  shaders: ^2.5.99
  sharp: ^0.34.5
  sonner: ^2.0.7
  tailwind-merge: ^3.5.0
  vcard-creator: ^0.7.2
  web-haptics: ^0.0.6

  # Content / docs pipeline
  fumadocs-core: ^16.7.16
  fumadocs-typescript: ^5.2.6
  hast-util-to-jsx-runtime: ^2.3.6
  mermaid: ^11.14.0
  rehype-external-links: ^3.0.0
  rehype-pretty-code: ^0.14.3
  rehype-raw: ^7.0.0
  rehype-slug: ^6.0.0
  remark: ^15.0.1
  remark-gfm: ^4.0.1
  remark-mdx: ^3.1.1
  remark-rehype: ^11.1.2
  shiki: 4.0.1
  unist-builder: 3.0.0
  unist-util-visit: ^5.1.0

  # Utility libraries
  "@date-fns/tz": ^1.4.1
  date-fns: ^4.1.0
  gray-matter: ^4.0.3
  libphonenumber-js: ^1.12.41
  lru-cache: ^11.3.5
  zod: ^3.25.76

  # Styling
  "@tailwindcss/postcss": ^4.2.2
  "@tailwindcss/typography": ^0.5.19
  "@toolwind/corner-shape": 0.0.8-3
  tailwindcss: ^4.2.2
  tw-animate-css: ^1.4.0

  # Types
  "@total-typescript/ts-reset": ^0.6.1
  "@types/hast": ^3.0.4
  "@types/node": ^24.12.2
  "@types/react": 19.2.14
  "@types/react-dom": 19.2.3

  # Tooling
  "@fission-ai/openspec": ^1.3.0
  libphonenumber-metadata-generator: ^1.1.0
  puppeteer: ^24.41.0
  rimraf: ^6.1.3
  shadcn: 3.6.3
  strip-indent: ^4.1.1
  typescript: ^5.9.3

  # Vite+ toolchain
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

# Named catalog for experimental workspaces (packages/utils) that
# want to run ahead of the default catalog.
catalogs:
  preview:
    "@types/node": ^25.6.0
    typescript: ^6.0.2

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
